services:
  postgres:
    image: postgres:16
    container_name: crm-system-postgres
    environment:
      POSTGRES_DB: crm_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crm_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
