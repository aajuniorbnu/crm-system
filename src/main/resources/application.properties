spring.application.name=crm-system

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/crm_system;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

app.jwt.secret=${APP_JWT_SECRET:crm-system-super-secret-key-change-me-2026}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.upload-dir=${APP_UPLOAD_DIR:./uploads}
