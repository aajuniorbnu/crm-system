<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(titulo='Vendas', pagina='vendas', conteudo=~{::content})}">
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gerenciamento de Vendas</h2>
        <button class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Nova Venda
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Data</th>
                        <th>Valor Total</th>
                        <th>Desconto</th>
                        <th>Valor Final</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="venda : ${vendas}">
                        <td th:text="${venda.id}"></td>
                        <td th:text="${venda.cliente != null ? venda.cliente.nome : 'N/A'}"></td>
                        <td th:text="${#temporals.format(venda.dataVenda, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(venda.valorTotal, 1, 2)}"></td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(venda.desconto, 1, 2)}"></td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(venda.valorFinal, 1, 2)}"></td>
                        <td><span class="badge bg-success" th:text="${venda.status}"></span></td>
                        <td>
                            <button class="btn btn-sm btn-info">
                                <i class="bi bi-eye"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
