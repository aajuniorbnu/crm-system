<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(titulo='Produtos', pagina='produtos', conteudo=~{::content})}">
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gerenciamento de Produtos</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalProduto">
            <i class="bi bi-plus-circle"></i> Novo Produto
        </button>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <h3 th:text="${totalProdutos}">0</h3>
                    <p class="text-muted">Total de Produtos</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <h3 th:text="${'R$ ' + valorEstoque}">R$ 0,00</h3>
                    <p class="text-muted">Valor em Estoque</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-warning">
                <div class="card-body text-center">
                    <h3 class="text-warning" th:text="${produtosEstoqueBaixo}">0</h3>
                    <p class="text-muted">Estoque Baixo</p>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td th:text="${produto.codigo}"></td>
                        <td th:text="${produto.nome}"></td>
                        <td th:text="${produto.categoria}"></td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(produto.preco, 1, 2)}"></td>
                        <td>
                            <span th:class="${produto.estoque <= produto.estoqueMinimo} ? 'badge bg-danger' : 'badge bg-success'"
                                  th:text="${produto.estoque}"></span>
                        </td>
                        <td><span class="badge bg-info" th:text="${produto.status}"></span></td>
                        <td>
                            <button class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
