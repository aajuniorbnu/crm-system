<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo}">CRM System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
  <link rel="stylesheet" href="/src/main/resources/static/css/styles.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 sidebar">
                <div class="p-3">
                    <h4>CRM System</h4>
                    <hr>
                    <a th:href="@{/src/main/resources/templates/dashboard}" th:classappend="${pagina == 'dashboard'} ? 'active' : ''">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a th:href="@{/src/main/resources/templates/clientes}" th:classappend="${pagina == 'clientes'} ? 'active' : ''">
                        <i class="bi bi-people"></i> Clientes
                    </a>
                    <a th:href="@{/src/main/resources/templates/produtos}" th:classappend="${pagina == 'produtos'} ? 'active' : ''">
                        <i class="bi bi-box-seam"></i> Produtos
                    </a>
                    <a th:href="@{/src/main/resources/templates/vendas}" th:classappend="${pagina == 'vendas'} ? 'active' : ''">
                        <i class="bi bi-cart"></i> Vendas
                    </a>
                    <a th:href="@{/src/main/resources/templates/tickets}" th:classappend="${pagina == 'tickets'} ? 'active' : ''">
                        <i class="bi bi-ticket"></i> Tickets
                    </a>
                    <a th:href="@{/src/main/resources/templates/relatorio}" th:classappend="${pagina == 'relatorios'} ? 'active' : ''">
                        <i class="bi bi-graph-up"></i> Relatórios
                    </a>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 main-content">
                <div th:replace="${conteudo}"></div>
            </main>
        </div>
    </div>

    <!-- Bootstrap Bundle JS (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery (opcional, mas útil para AJAX) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
</body>
</html>
