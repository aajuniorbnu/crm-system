<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(titulo='Clientes', pagina='clientes', conteudo=~{::content})}">
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gerenciamento de Clientes</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCliente">
            <i class="bi bi-plus-circle"></i> Novo Cliente
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-md-6">
                    <input type="text" class="form-control" id="searchCliente" placeholder="Buscar por nome...">
                </div>
                <div class="col-md-3">
                    <select class="form-select" id="filterStatus">
                        <option value="">Todos os Status</option>
                        <option value="ATIVO">Ativo</option>
                        <option value="INATIVO">Inativo</option>
                        <option value="PROSPECTO">Prospecto</option>
                    </select>
                </div>
            </div>

            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Telefone</th>
                        <th>Tipo</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td th:text="${cliente.id}"></td>
                        <td th:text="${cliente.nome}"></td>
                        <td th:text="${cliente.email}"></td>
                        <td th:text="${cliente.telefone}"></td>
                        <td th:text="${cliente.tipo}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${cliente.status == 'ATIVO'} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${cliente.status}"></span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-info" th:onclick="'verCliente(' + ${cliente.id} + ')'">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-warning" th:onclick="'editarCliente(' + ${cliente.id} + ')'">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" th:onclick="'deletarCliente(' + ${cliente.id} + ')'">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalCliente" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cadastrar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formCliente">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Nome *</label>
                                <input type="text" class="form-control" name="nome" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="text" class="form-control" name="telefone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">CPF/CNPJ</label>
                                <input type="text" class="form-control" name="cpfCnpj">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tipo</label>
                                <select class="form-select" name="tipo">
                                    <option value="PESSOA_FISICA">Pessoa Física</option>
                                    <option value="PESSOA_JURIDICA">Pessoa Jurídica</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" name="status">
                                    <option value="ATIVO">Ativo</option>
                                    <option value="PROSPECTO">Prospecto</option>
                                    <option value="INATIVO">Inativo</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Endereço</label>
                            <input type="text" class="form-control" name="endereco">
                        </div>
                        <div class="row">
                            <div class="col-md-5 mb-3">
                                <label class="form-label">Cidade</label>
                                <input type="text" class="form-control" name="cidade">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Estado</label>
                                <input type="text" class="form-control" name="estado">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">CEP</label>
                                <input type="text" class="form-control" name="cep">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarCliente()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function salvarCliente() {
            const formData = new FormData(document.getElementById('formCliente'));
            const data = Object.fromEntries(formData);

            fetch('/api/clientes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                alert('Cliente salvo com sucesso!');
                location.reload();
            });
        }

        function deletarCliente(id) {
            if (confirm('Deseja realmente deletar este cliente?')) {
                fetch('/api/clientes/' + id, { method: 'DELETE' })
                    .then(() => location.reload());
            }
        }
    </script>
</div>
</html>
