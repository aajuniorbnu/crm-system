<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(titulo='Dashboard', pagina='dashboard', conteudo=~{::content})}">
<div th:fragment="content">
    <h2>Dashboard</h2>

    <div class="row mt-4">
        <div class="col-md-3">
            <div class="card stat-card primary">
                <div class="card-body">
                    <h5>Total de Clientes</h5>
                    <h2 th:text="${totalClientes}">0</h2>
                    <small class="text-muted">Cadastrados no sistema</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card success">
                <div class="card-body">
                    <h5>Vendas do Mês</h5>
                    <h2 th:text="${vendasMes}">0</h2>
                    <small class="text-muted">Total de vendas</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card warning">
                <div class="card-body">
                    <h5>Produtos</h5>
                    <h2 th:text="${totalProdutos}">0</h2>
                    <small class="text-muted">No estoque</small>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card danger">
                <div class="card-body">
                    <h5>Tickets Abertos</h5>
                    <h2 th:text="${ticketsAbertos}">0</h2>
                    <small class="text-muted">Aguardando atendimento</small>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5>Últimas Vendas</h5>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Valor</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="venda : ${ultimasVendas}">
                                <td th:text="${venda.id}"></td>
                                <td th:text="${venda.cliente != null ? venda.cliente.nome : 'N/A'}"></td>
                                <td th:text="${'R$ ' + #numbers.formatDecimal(venda.valorFinal, 1, 2)}"></td>
                                <td><span class="badge bg-success" th:text="${venda.status}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5>Produtos com Estoque Baixo</h5>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Estoque</th>
                                <th>Mínimo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="produto : ${produtosEstoqueBaixo}">
                                <td th:text="${produto.nome}"></td>
                                <td><span class="badge bg-danger" th:text="${produto.estoque}"></span></td>
                                <td th:text="${produto.estoqueMinimo}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
