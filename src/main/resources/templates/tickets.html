<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(titulo='Tickets', pagina='tickets', conteudo=~{::content})}">
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Gerenciamento de Tickets</h2>
        <button class="btn btn-primary">
            <i class="bi bi-plus-circle"></i> Novo Ticket
        </button>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Assunto</th>
                        <th>Prioridade</th>
                        <th>Status</th>
                        <th>Data Abertura</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ticket : ${tickets}">
                        <td th:text="${ticket.id}"></td>
                        <td th:text="${ticket.cliente != null ? ticket.cliente.nome : 'N/A'}"></td>
                        <td th:text="${ticket.assunto}"></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${ticket.prioridade == 'URGENTE'} ? 'bg-danger' : (${ticket.prioridade == 'ALTA'} ? 'bg-warning' : 'bg-info')"
                                  th:text="${ticket.prioridade}"></span>
                        </td>
                        <td>
                            <span class="badge bg-primary" th:text="${ticket.status}"></span>
                        </td>
                        <td th:text="${#temporals.format(ticket.dataAbertura, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <button class="btn btn-sm btn-info">
                                <i class="bi bi-eye"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
