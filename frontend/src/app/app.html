<div class="min-h-screen bg-stone-950 text-white">
  <div class="absolute inset-x-0 top-0 -z-10 h-[32rem] bg-[radial-gradient(circle_at_top,_rgba(34,197,94,0.22),_transparent_45%),radial-gradient(circle_at_right,_rgba(251,191,36,0.18),_transparent_30%),linear-gradient(180deg,_#0f172a_0%,_#111827_55%,_#09090b_100%)]"></div>

  <header class="sticky top-0 z-30 border-b border-white/10 bg-stone-950/85 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 lg:flex-row lg:items-center lg:justify-between lg:px-6">
      <a routerLink="/" class="flex items-center gap-3">
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-amber-300 text-lg font-black text-stone-900">
          VP
        </div>
        <div>
          <p class="text-xs uppercase tracking-[0.35em] text-emerald-300">VistaPrime</p>
          <h1 class="font-display text-xl text-white">Imobiliaria para corretores em alta performance</h1>
        </div>
      </a>

      <nav class="flex flex-wrap gap-2 text-sm font-semibold text-stone-300">
        @for (item of navigation; track item.href) {
          <a
            [routerLink]="item.href"
            routerLinkActive="bg-white text-stone-950"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            class="rounded-full border border-white/10 px-4 py-2 transition hover:border-emerald-300 hover:text-white"
          >
            {{ item.label }}
          </a>
        }
      </nav>

      <div class="flex flex-wrap items-center gap-3">
        @if (isAuthenticated()) {
          <div class="hidden rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm text-stone-200 md:block">
            {{ corretor()?.nome }}
          </div>
          <a routerLink="/painel/perfil" class="rounded-full border border-emerald-300/30 px-4 py-2 text-sm font-semibold text-emerald-200 transition hover:border-emerald-300 hover:text-white">
            Perfil
          </a>
          <button
            type="button"
            class="rounded-full bg-amber-300 px-4 py-2 text-sm font-bold text-stone-950 transition hover:bg-amber-200"
            (click)="logout()"
          >
            Sair
          </button>
        } @else {
          <a
            [routerLink]="authLink().href"
            class="rounded-full bg-amber-300 px-4 py-2 text-sm font-bold text-stone-950 transition hover:bg-amber-200"
          >
            {{ authLink().label }}
          </a>
        }
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-4 py-8 lg:px-6 lg:py-10">
    <router-outlet></router-outlet>
  </main>
</div>
