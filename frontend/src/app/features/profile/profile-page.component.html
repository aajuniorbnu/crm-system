<section class="mx-auto max-w-4xl space-y-8">
  <div class="rounded-[2rem] border border-white/10 bg-white/6 p-6 backdrop-blur">
    <p class="text-xs uppercase tracking-[0.35em] text-emerald-200">Perfil do corretor</p>
    <h2 class="mt-3 font-display text-4xl text-white"></h2>
    <p class="mt-3 max-w-2xl text-base leading-7 text-stone-300">
  
    </p>
  </div>

  @if (error()) {
    <div class="rounded-[1.6rem] border border-rose-400/30 bg-rose-400/10 px-5 py-4 text-rose-100">
      {{ error() }}
    </div>
  }

  @if (success()) {
    <div class="rounded-[1.6rem] border border-emerald-300/30 bg-emerald-300/10 px-5 py-4 text-emerald-100">
      {{ success() }}
    </div>
  }

  <div class="grid gap-8 lg:grid-cols-[0.7fr_1.3fr]">
    <article class="rounded-[2rem] border border-white/10 bg-stone-950/55 p-6">
      <div class="overflow-hidden rounded-[1.7rem] border border-white/10 bg-white/5">
        @if (previewUrl()) {
          <img [src]="previewUrl()!" alt="Foto do corretor" class="h-72 w-full object-cover" />
        } @else {
          <div class="flex h-72 items-center justify-center bg-[linear-gradient(135deg,#1f2937,#111827)] text-lg font-black text-stone-400">
            Sem foto
          </div>
        }
      </div>

      <label class="mt-5 block">
        <span class="mb-2 block text-sm font-semibold text-stone-200"></span>
        <input #fotoInput type="file" accept="image/*" class="block w-full text-sm text-stone-300" (change)="onFileChange()" />
      </label>
    </article>

    <article class="rounded-[2rem] border border-white/10 bg-white/95 p-6 text-stone-900 shadow-[0_30px_80px_rgba(15,23,42,0.18)]">
      @if (loading()) {
        <div class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-8 text-center text-stone-500">
          Carregando perfil...
        </div>
      } @else {
        <form class="grid gap-5" [formGroup]="form" (ngSubmit)="salvar()">
          <label class="space-y-2 text-sm">
            <span class="font-semibold text-stone-700">Nome</span>
            <input class="w-full rounded-2xl border border-stone-200 px-4 py-3 outline-none transition focus:border-emerald-500" formControlName="nome" />
          </label>

          <label class="space-y-2 text-sm">
            <span class="font-semibold text-stone-700">Telefone</span>
            <input class="w-full rounded-2xl border border-stone-200 px-4 py-3 outline-none transition focus:border-emerald-500" formControlName="telefone" />
          </label>

          <label class="space-y-2 text-sm">
            <span class="font-semibold text-stone-700">CRECI</span>
            <input class="w-full rounded-2xl border border-stone-200 px-4 py-3 outline-none transition focus:border-emerald-500" formControlName="creci" />
          </label>

          <div class="flex flex-wrap gap-3">
            <button
              type="submit"
              class="rounded-full bg-stone-950 px-5 py-3 text-sm font-black text-white transition hover:bg-emerald-600 disabled:cursor-not-allowed disabled:bg-stone-500"
              [disabled]="saving()"
            >
              {{ saving() ? 'Salvando...' : 'Salvar perfil' }}
            </button>
            <a routerLink="/painel" class="rounded-full border border-stone-200 px-5 py-3 text-sm font-bold text-stone-700">
              Voltar ao dashboard
            </a>
          </div>
        </form>
      }
    </article>
  </div>
</section>
